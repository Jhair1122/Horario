<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#2b4a91">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>ClassTimes</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #f2f4f8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      max-width: 500px;
      margin: 0 auto;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Header exacto como en imagen */
    .app-header {
      background: #2b4a91;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .back-btn {
      background: none;
      border: none;
      color: white;
      font-size: 1.8rem;
      line-height: 1;
      cursor: pointer;
      padding: 0 4px;
      opacity: 0.9;
    }
    .header-title {
      color: white;
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    /* Week strip (calendario) */
    .week-strip {
      background: #2b4a91;
      padding: 6px 0 0 0;
      position: sticky;
      top: 56px;
      z-index: 99;
    }
    .week-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
    }
    .day-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6px 0 8px;
    }
    .day-name {
      font-size: 0.7rem;
      font-weight: 400;
      color: rgba(255,255,255,0.65);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .day-circle {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      transition: background 0.2s;
    }
    .day-circle.active {
      background: #4db8ff;
    }
    .day-number {
      font-size: 1.1rem;
      font-weight: 500;
      color: rgba(255,255,255,0.85);
    }
    .day-circle.active .day-number {
      color: white;
      font-weight: 700;
    }
    .week-pill {
      display: flex;
      justify-content: center;
      padding: 6px 0 8px;
    }
    .pill-bar {
      width: 32px;
      height: 3px;
      background: rgba(255,255,255,0.25);
      border-radius: 10px;
    }

    /* Contenedor del contenido (exacto a las imágenes) */
    .content-container {
      padding: 12px 14px 40px;
    }

    /* Lista con guiones (como en la imagen 3875) */
    .days-list {
      margin-bottom: 1.5rem;
    }
    .day-group {
      margin-bottom: 0.8rem;
    }
    .day-heading {
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 0.2rem;
    }
    .day-numbers {
      margin-left: 1.2rem;
      list-style: none;
    }
    .day-numbers li {
      font-size: 1rem;
      margin-bottom: 0.1rem;
      position: relative;
    }
    .day-numbers li::before {
      content: "- ";
      position: absolute;
      left: -1rem;
    }

    /* Bloques de horario (igual que en 3875) */
    .schedule-block {
      margin-bottom: 1.5rem;
    }
    .block-day {
      font-weight: 700;
      font-size: 1rem;
      margin: 0.2rem 0;
    }
    .block-time {
      font-weight: 700;
      font-size: 0.95rem;
      margin: 0.2rem 0;
    }
    .course-name {
      font-weight: 700;
      font-size: 1rem;
      margin: 0.4rem 0 0.1rem;
    }
    .teacher-name {
      font-size: 0.92rem;
      margin: 0.1rem 0;
    }
    .location {
      font-size: 0.88rem;
      color: #4a6272;
      margin-top: 0.2rem;
    }

    /* Línea divisoria (--- en las imágenes) */
    .divider {
      margin: 1rem 0;
      border: none;
      height: 1px;
      background: #cbd5e1;
    }
  </style>
</head>
<body>

<header class="app-header">
  <button class="back-btn" id="backBtn">‹</button>
  <span class="header-title">ClassTimes</span>
</header>

<div class="week-strip">
  <div class="week-grid" id="weekGrid"></div>
  <div class="week-pill"><div class="pill-bar"></div></div>
</div>

<div class="content-container" id="contentContainer"></div>

<script>
  // =========================================================================
  // CONTENIDO EXACTO DE LAS IMÁGENES (3875.jpg, 0627.jpg, 3833.jpg)
  // Cada semana respeta fielmente los textos, guiones y bloques.
  // =========================================================================

  // Semana 1: basada en 3875.jpg (semana del domingo 17 de mayo de 2026)
  const semana3875 = {
    fechaInicio: new Date(2026, 4, 17), // domingo 17 mayo
    // Días con listas de números (como aparece en la imagen)
    listasDias: [
      { nombre: "Dom", numeros: [17, 18, 19, 20] }
    ],
    // Bloques de horarios
    bloques: [
      { dia: "Lun", hora: "10:00 PM - 11:00 PM", curso: "REV Y CALIF CUADERNOS INFORME", profesor: "UTOS CERAS, LUIS ALBERTO", ubicacion: "ENTORNO VIRTUAL SV-EV - N/A" },
      { dia: "Mié", hora: "8:00 AM - 1:00 PM", curso: "FORMACIÓN PRÁCTICA EN EMP I", profesor: "DOCENTE NO ASIGNADO,", ubicacion: "ENTORNO VIRTUAL SV-EV - N/A" },
      { dia: "Mié", hora: "2:00 PM - 5:00 PM", curso: "SEMINARIO COMPLEMENT PRÁCT I", profesor: "UTOS CERAS, LUIS ALBERTO", ubicacion: "CFP RIO NEGRO-PRINCIPAL 2 34-P2 - 108" },
      { dia: "Mié", hora: "6:31 PM - 7:59 PM", curso: "DESARROLLO HUMANO", profesor: "BALTAZAR VASQUEZ, NICANOR FELIX", ubicacion: "CFP RIO NEGRO-PRINCIPAL 2 34-P2 - 205" },
      { dia: "Mié", hora: "8:00 AM - 1:00 PM", curso: "FORMACIÓN PRÁCTICA EN EMP I", profesor: "DOCENTE NO ASIGNADO,", ubicacion: "ENTORNO VIRTUAL SV-EV - N/A" },
      { dia: "Mié", hora: "8:00 AM - 1:00 PM", curso: "FORMACIÓN PRÁCTICA EN EMP I", profesor: "DOCENTE NO ASIGNADO,", ubicacion: "ENTORNO VIRTUAL SV-EV - N/A" }
    ]
  };

  // Semana 2: basada en 0627.jpg (semana del domingo 10 de mayo de 2026)
  const semana0627 = {
    fechaInicio: new Date(2026, 4, 10), // domingo 10 mayo
    listasDias: [
      { nombre: "Dom", numeros: [10, 11] },
      { nombre: "Lun", numeros: [11, 12] },
      { nombre: "Mar", numeros: [12, 13] },
      { nombre: "Mie", numeros: [13, 14] },
      { nombre: "Jue", numeros: [14, 15] },
      { nombre: "Vie", numeros: [15, 16] }
    ],
    bloques: [
      { hora: "7:45 AM - 10:00 AM", curso: "ARTIF INTEL WITH MACH LEAR JAV", profesor: "UTOS CERAS, LUIS ALBERTO", ubicacion: "CFP RIO NEGRO-PRINCIPAL 2 34-P2 - 108" },
      { hora: "10:15 AM - 12:30 PM", curso: "ARTIF INTEL WITH MACH LEAR JAV", profesor: "UTOS CERAS, LUIS ALBERTO", ubicacion: "CFP RIO NEGRO-PRINCIPAL 2 34-P2 - 108" },
      { hora: "3:30 PM - 6:30 PM", curso: "ARTIF INTEL WITH MACH LEAR JAV", profesor: "UTOS CERAS, LUIS ALBERTO", ubicacion: "CFP RIO NEGRO-PRINCIPAL 2 34-P2 - 108" },
      { hora: "8:00 AM - 1:00 PM", curso: "FORMACIÓN PRÁCTICA EN EMPI", profesor: "DOCENTE NO ASIGNADO,", ubicacion: "ENTORNO VIRTUAL SV-EV - N/A" },
      { hora: "2:00 PM - 5:00 PM", curso: "SEMINARIO COMPLEMENT PRÁCTI", profesor: "UTOS CERAS, LUIS ALBERTO", ubicacion: "CFP RIO NEGRO-PRINCIPAL 2 34-P2 - 108" },
      { hora: "10:00 PM - 11:00 PM", curso: "REV Y CALIF CUADERNOS INFORME", profesor: "UTOS CERAS, LUIS ALBERTO", ubicacion: "ENTORNO VIRTUAL SV-EV - N/A" },
      { hora: "8:00 AM - 1:00 PM", curso: "FORMACIÓN PRÁCTICA EN EMPI", profesor: "DOCENTE NO ASIGNADO" }  // sin ubicación
    ]
  };

  // Semana 3: basada en 3833.jpg (semana del domingo 17 de mayo de 2026 - otra vista)
  const semana3833 = {
    fechaInicio: new Date(2026, 4, 17), // domingo 17 mayo
    listasDias: [
      { nombre: "Dom", numeros: [17, 18] },
      { nombre: "Lun", numeros: [19] },
      { nombre: "Mar", numeros: [20] },
      { nombre: "Mie", numeros: [21] },
      { nombre: "Jue", numeros: [22] },
      { nombre: "Vie", numeros: [23] }
    ],
    bloques: [
      { numero: "20", dia: "Mie", hora: "8:00 AM - 1:00 PM", curso: "FORMACIÓN PRÁCTICA EN EMPI", profesor: "DOCENTE NO ASIGNADO,", ubicacion: "ENTORNO VIRTUAL SV-EV - N/A" },
      { hora: "2:00 PM - 5:00 PM", curso: "SEMINARIO COMPLEMENT PRÁCTI", profesor: "UTOS CERAS, LUIS ALBERTO", ubicacion: "CFP RIO NEGRO-PRINCIPAL 2 34-P2 - 108" },
      { hora: "6:31 PM - 7:59 PM", curso: "DESARROLLO HUMANO", profesor: "BALTZAR VASQUEZ, NICANOR FELIX", ubicacion: "CFP RIO NEGRO-PRINCIPAL 2 34-P2 - 205" },
      { hora: "8:00 AM - 1:00 PM", curso: "FORMACIÓN PRÁCTICA EN EMPI", profesor: "DOCENTE NO ASIGNADO,", ubicacion: "ENTORNO VIRTUAL SV-EV - N/A" },
      { hora: "8:00 AM - 1:00 PM", curso: "FORMACIÓN PRÁCTICA EN EMPI", profesor: "DOCENTE NO ASIGNADO,", ubicacion: "ENTORNO VIRTUAL SV-EV - N/A" },
      { numero: "22", dia: "Vie", hora: "8:00 AM - 1:00 PM", curso: "FORMACIÓN PRÁCTICA EN EMPI", profesor: "DOCENTE NO ASIGNADO,", ubicacion: "ENTORNO VIRTUAL SV-EV - N/A" }
    ]
  };

  const semanas = [semana3875, semana0627, semana3833];
  let currentIndex = 0;

  // Helper: obtener fecha de un día específico de la semana (0 = domingo)
  function getDayDate(fechaInicio, dayIndex) {
    const d = new Date(fechaInicio);
    d.setDate(fechaInicio.getDate() + dayIndex);
    return d;
  }

  // Renderizar el week strip (calendario azul) con las fechas reales
  function renderWeekStrip() {
    const semana = semanas[currentIndex];
    const inicio = semana.fechaInicio;
    const diasSemana = ["Dom", "Lun", "Mar", "Mie", "Jue", "Vie", "Sab"];
    const grid = document.getElementById("weekGrid");
    if (!grid) return;

    // Determinar qué día tiene el círculo azul: lunes (índice 1) o el primer día con bloque
    let activeIndex = 1; // lunes por defecto
    // Para la semana 3875, el primer bloque es "Lun", así que activamos lunes
    // Para las demás también activamos lunes
    if (currentIndex === 2) activeIndex = 1; // semana3833 también lunes

    grid.innerHTML = diasSemana.map((name, idx) => {
      const fecha = getDayDate(inicio, idx);
      const numDia = fecha.getDate();
      const isActive = (idx === activeIndex);
      return `
        <div class="day-cell">
          <span class="day-name">${name}</span>
          <div class="day-circle ${isActive ? 'active' : ''}">
            <span class="day-number">${numDia}</span>
          </div>
        </div>
      `;
    }).join("");
  }

  // Renderizar el contenido exacto (lista con guiones + bloques)
  function renderContent() {
    const container = document.getElementById("contentContainer");
    if (!container) return;
    const semana = semanas[currentIndex];
    let html = "";

    // 1. Mostrar los días con sus números con guiones (si existen)
    if (semana.listasDias && semana.listasDias.length) {
      html += `<div class="days-list">`;
      for (let grupo of semana.listasDias) {
        html += `<div class="day-group">
          <div class="day-heading">${grupo.nombre}</div>
          <ul class="day-numbers">`;
        grupo.numeros.forEach(num => {
          html += `<li>${num}</li>`;
        });
        html += `</ul></div>`;
      }
      html += `</div>`;
      // Línea divisoria "---" como en las imágenes
      html += `<hr class="divider">`;
    }

    // 2. Mostrar los bloques de horarios (respetando el orden y formato)
    for (let block of semana.bloques) {
      html += `<div class="schedule-block">`;
      if (block.numero) html += `<div class="block-day">${block.numero}</div>`;
      if (block.dia) html += `<div class="block-day">${block.dia}</div>`;
      if (block.hora) html += `<div class="block-time">${block.hora}</div>`;
      if (block.curso) html += `<div class="course-name">${block.curso}</div>`;
      if (block.profesor) html += `<div class="teacher-name">${block.profesor}</div>`;
      if (block.ubicacion) html += `<div class="location">${block.ubicacion}</div>`;
      html += `</div>`;
    }

    container.innerHTML = html;
  }

  // Navegación entre semanas (deslizar vertical)
  let touchStartY = 0;

  function navigate(delta) {
    let newIndex = currentIndex + delta;
    if (newIndex < 0) newIndex = 0;
    if (newIndex >= semanas.length) newIndex = semanas.length - 1;
    if (newIndex === currentIndex) return;

    currentIndex = newIndex;
    renderWeekStrip();
    renderContent();
  }

  // Eventos táctiles para deslizar
  function initSwipe() {
    const container = document.getElementById("contentContainer");
    if (!container) return;
    container.addEventListener("touchstart", (e) => {
      touchStartY = e.touches[0].clientY;
    }, { passive: true });
    container.addEventListener("touchend", (e) => {
      if (!touchStartY) return;
      const diff = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(diff) > 50) {
        navigate(diff > 0 ? -1 : 1);
      }
      touchStartY = 0;
    });
  }

  // Botón volver (semana anterior)
  document.getElementById("backBtn")?.addEventListener("click", () => navigate(-1));

  // Rueda del mouse para escritorio
  let wheelCooldown = false;
  document.addEventListener("wheel", (e) => {
    e.preventDefault();
    if (wheelCooldown) return;
    wheelCooldown = true;
    setTimeout(() => { wheelCooldown = false; }, 400);
    navigate(e.deltaY > 0 ? 1 : -1);
  }, { passive: false });

  // Inicializar
  renderWeekStrip();
  renderContent();
  initSwipe();
</script>
</body>
</html>
