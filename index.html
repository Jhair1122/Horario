<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a2540">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ClassTimes">
  <link rel="manifest" href="data:application/manifest+json,{
    %22name%22:%22ClassTimes%22,
    %22short_name%22:%22ClassTimes%22,
    %22start_url%22:%22.%22,
    %22display%22:%22standalone%22,
    %22background_color%22:%22%23f2f4f8%22,
    %22theme_color%22:%22%230a2540%22,
    %22icons%22:[
      {%22src%22:%22data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230a2540'/%3E%3Ctext x='50' y='67' font-size='50' text-anchor='middle' fill='white' font-family='monospace'%3ECT%3C/text%3E%3C/svg%3E%22,%22sizes%22:%22any%22,%22type%22:%22image/svg+xml%22%7D
    ]
  }">
  <title>ClassTimes</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #f2f4f8;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      padding: 1rem 0.85rem 2.5rem 0.85rem;
      color: #111;
    }
    .schedule-container { max-width:700px; margin:0 auto; }
    .class-header { margin-bottom:1.5rem; border-bottom:2px solid #d0d7de; }
    .class-header h1 {
      font-size:1.9rem; font-weight:700; color:#0a2540;
      background:#fff; display:inline-block; padding-right:1rem;
    }
    .schedule-card {
      background: white; border-radius: 18px; box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      margin-bottom: 0.85rem; padding: 1rem 1.1rem; border: 1px solid #e9edf2;
    }
    .day-line {
      display: flex; align-items: baseline; gap: 0.5rem;
      margin-bottom: 0.65rem; border-left: 4px solid #2c7da0; padding-left: 0.75rem;
      flex-wrap: wrap;
    }
    .day-name { font-weight:800; font-size:1.35rem; color:#1f5068; }
    .time-slot {
      font-family: monospace; font-weight:500; font-size:0.9rem;
      background:#eef2f7; padding:0.2rem 0.7rem; border-radius:40px;
      color:#1e3a4d;
    }
    .course-name { font-weight:700; font-size:1rem; color:#0c2e3e; margin-bottom:0.25rem; word-break:break-word; }
    .teacher-name { font-size:0.9rem; color:#2c5a6e; margin-bottom:0.2rem; }
    .location-text {
      font-size:0.85rem; color:#4b6a7c; background:#f8fafc;
      display:inline-block; padding:0.2rem 0.5rem; border-radius:12px;
      margin-top:0.25rem; font-family:monospace;
    }
    .numeric-value {
      font-weight:600; font-size:1.2rem; background:#f1f5f9;
      display:inline-block; padding:0.2rem 1rem; border-radius:30px;
      color:#0f3b4f; font-family:monospace;
    }
    footer { text-align:center; font-size:0.7rem; color:#8a9cb0; margin-top:2rem; border-top:1px solid #e2e8f0; padding-top:1rem; }
  </style>
</head>
<body>
<div class="schedule-container">
  <div class="class-header"><h1>ClassTimes</h1></div>
  <div id="horario-exacto"></div>
  <footer>Horario oficial — app local instalable</footer>
</div>
<script>
  const entries = [
    { day:"Dom", num:"17" },{ day:"Dom", num:"18" },
    { day:"Lun", time:"7:45 AM - 10:00 AM", course:"ARTIF INTEL WITH MACH LEAR JAV", teacher:"UTOS CERAS, LUIS ALBERTO", loc:"CFP RIO NEGRO-PRINCIPAL 2 34-P2 - 108" },
    { day:"Mié", num:"19" },{ day:"Mié", num:"20" },{ day:"Jue", num:"21" },{ day:"Jue", num:"22" },{ day:"Vie", num:"23" },
    { day:"Lun", time:"10:15 AM - 12:30 PM", course:"ARTIF INTEL WITH MACH LEAR JAV", teacher:"UTOS CERAS, LUIS ALBERTO", loc:"CFP RIO NEGRO-PRINCIPAL 2 34-P2 - 108" },
    { day:"Mié", time:"8:00 AM - 1:00 PM", course:"FORMACIÓN PRÁCTICA EN EMPI", teacher:"DOCENTE NO ASIGNADO,", loc:"ENTORNO VIRTUAL SV-EV - N/A" },
    { day:"Mar", time:"2:00 PM - 5:00 PM", course:"SEMINARIO COMPLEMENT PRÁCTI", teacher:"UTOS CERAS, LUIS ALBERTO", loc:"CFP RIO NEGRO-PRINCIPAL 2 34-P2 - 108" },
    { day:"Mié", time:"10:00 PM - 11:00 PM", course:"REV Y CALIF CUADERNOS INFORME", teacher:"UTOS CERAS, LUIS ALBERTO", loc:"ENTORNO VIRTUAL SV-EV - N/A" },
    { day:"Mié", time:"8:00 AM - 1:00 PM", course:"FORMACIÓN PRÁCTICA EN EMPI", teacher:"DOCENTE NO ASIGNADO", loc:null }
  ];
  const container = document.getElementById('horario-exacto');
  entries.forEach(e => {
    const card = document.createElement('div'); card.className = 'schedule-card';
    const line = document.createElement('div'); line.className = 'day-line';
    const daySpan = document.createElement('span'); daySpan.className = 'day-name'; daySpan.textContent = e.day;
    line.appendChild(daySpan);
    if(e.num) { const badge = document.createElement('span'); badge.className = 'time-slot'; badge.textContent = e.num; line.appendChild(badge); }
    else if(e.time) { const badge = document.createElement('span'); badge.className = 'time-slot'; badge.textContent = e.time; line.appendChild(badge); }
    card.appendChild(line);
    if(e.num) {
      const extra = document.createElement('div'); extra.className = 'simple-info';
      const pill = document.createElement('span'); pill.className = 'numeric-value'; pill.textContent = e.num;
      extra.appendChild(pill); card.appendChild(extra);
    } else if(e.course) {
      const block = document.createElement('div'); block.className = 'course-detail';
      const cn = document.createElement('div'); cn.className = 'course-name'; cn.textContent = e.course;
      block.appendChild(cn);
      if(e.teacher) { const tn = document.createElement('div'); tn.className = 'teacher-name'; tn.textContent = e.teacher; block.appendChild(tn); }
      if(e.loc) { const locSpan = document.createElement('div'); locSpan.className = 'location-text'; locSpan.textContent = e.loc; block.appendChild(locSpan); }
      card.appendChild(block);
    }
    container.appendChild(card);
  });
  // Service Worker para modo offline y funcionamiento como app instalada
  if('serviceWorker' in navigator) {
    navigator.serviceWorker.register('data:application/javascript,' + encodeURIComponent(`
      self.addEventListener('fetch', function(event) {
        event.respondWith(fetch(event.request).catch(() => caches.match(event.request)));
      });
      self.addEventListener('install', function(event) {
        self.skipWaiting();
      });
    `)).then(reg => console.log('SW registrado', reg)).catch(err => console.log('SW error', err));
  }
</script>
</body>
</html>
